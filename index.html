<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin 설계정책서</title>
    <link rel="stylesheet" href="./styles.css?v=20260618-6" />
    <script src="./vendor/lucide.min.js?v=20260618-1"></script>
    <script src="./app.js?v=20260618-6" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <p class="eyebrow">Admin menu policy workspace</p>
          <h1>어드민 설계정책서</h1>
        </div>
        <div class="topbar-tools">
          <div class="search-box">
            <i data-lucide="search"></i>
            <input id="globalSearch" type="search" placeholder="메뉴, 목적, 설명, 구 어드민, 설계 의견 검색" />
            <span class="search-count" id="searchCount">0</span>
          </div>
          <div class="status-filter" id="statusFilter" aria-label="상태 필터"></div>
        </div>
      </header>

      <aside class="sidebar" aria-label="어드민 메뉴 탐색">
        <div class="sidebar-summary" id="sidebarSummary"></div>
        <nav id="navList"></nav>
      </aside>

      <main class="content">
        <section class="overview-panel" id="overviewPanel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">CSV 기반 메뉴 정책</p>
              <h2>전체 메뉴 설계 현황</h2>
            </div>
            <button class="text-button" id="showAllButton" type="button">
              <i data-lucide="layout-list"></i>
              전체 보기
            </button>
          </div>
          <div class="metric-grid" id="metricGrid"></div>
          <div class="two-column">
            <section>
              <div class="section-subheading">
                <h3>준비중 제작 우선순위</h3>
              </div>
              <div class="priority-list" id="priorityList"></div>
            </section>
            <section>
              <div class="section-subheading">
                <h3>상단 메뉴별 진행 상태</h3>
              </div>
              <div class="table-wrap" id="topMenuTable"></div>
            </section>
          </div>
        </section>

        <section class="detail-panel" id="detailPanel" hidden>
          <div class="detail-header">
            <button class="icon-button" id="backToOverview" type="button" title="현황으로 이동" aria-label="현황으로 이동">
              <i data-lucide="arrow-left"></i>
            </button>
            <div>
              <p class="breadcrumb" id="detailBreadcrumb"></p>
              <h2 id="detailTitle"></h2>
            </div>
            <span class="status-chip" id="detailStatus"></span>
          </div>

          <section class="reference-block">
            <div>
              <p class="block-label">개발 참조 코드</p>
              <code id="detailCode"></code>
            </div>
            <p id="detailDirective"></p>
            <button class="text-button" id="copyDirective" type="button">
              <i data-lucide="copy"></i>
              지침 복사
            </button>
          </section>

          <div class="detail-grid">
            <section class="info-block">
              <p class="block-label">화면 목적</p>
              <p id="detailPurpose"></p>
            </section>
            <section class="info-block">
              <p class="block-label">구 어드민 매핑</p>
              <p id="detailLegacy"></p>
            </section>
          </div>

          <section class="info-block">
            <p class="block-label">업무 설명</p>
            <div class="token-list" id="detailDescription"></div>
          </section>

          <section class="info-block">
            <div class="section-subheading">
              <h3>탭 구성 제안</h3>
            </div>
            <div class="tab-list" id="detailTabs"></div>
          </section>

          <section class="info-block">
            <div class="section-subheading">
              <h3>설계 방식 제안</h3>
            </div>
            <div class="policy-grid" id="designOpinion"></div>
          </section>

          <section class="info-block">
            <div class="section-subheading">
              <h3>화면 정책 체크리스트</h3>
            </div>
            <div class="checklist-grid" id="policyChecklist"></div>
          </section>

          <section class="info-block special-policy-block" id="specialPolicyBlock" hidden>
            <div class="section-subheading">
              <div>
                <p class="eyebrow">Menu specific policy</p>
                <h3 id="specialPolicyTitle"></h3>
              </div>
            </div>
            <div id="specialPolicyContent"></div>
          </section>
        </section>

        <section class="list-panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Search results</p>
              <h2>메뉴 목록</h2>
            </div>
            <span class="result-summary" id="resultSummary"></span>
          </div>
          <div class="menu-grid" id="menuGrid"></div>
        </section>
      </main>
    </div>
  </body>
</html>
